<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Xizmatlar</title>
  <link rel="stylesheet" href="main.css" />

<body>

  <div class="page">

    <div class="card" style="--accent: #c471ed; --accent2: #f64f59;">

        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
      </div>
      <h2 class="card-title">Doimiy Support</h2>
      <p class="card-text">Savolingiz bo'lsa yopiq communitydan yoki shaxsan o'zimdan javob olsangiz bo'ladi.</p>
    </div>

    <div class="card" style="--accent: #f7971e; --accent2: #e05a00;">
      <div class="icon-wrap" style="--g1:#f7971e; --g2:#e05a00;">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="12" x2="14" y2="10"/>
          <line x1="12" y1="12" x2="10" y2="10"/>
          <line x1="12" y1="12" x2="12" y2="16"/>
          <line x1="8" y1="12" x2="12" y2="12"/>
          <line x1="16" y1="12" x2="12" y2="12"/>
        </svg>
      </div>
      <h2 class="card-title">100+ loyihadagi tajriba</h2>
      <p class="card-text">Logistika, ta'lim, qurilish, tibbiyot — dars rejalar 100+ loyihalarim tajribasi asosida tuzganman.</p>
    </div>

  </div>

</body>
</html>
